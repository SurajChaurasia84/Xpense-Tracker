name: xpense_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.1
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  url_launcher: ^6.3.0
  cloud_firestore: ^5.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  local_auth: ^3.0.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/icon.jpeg"
  image_path: "assets/icon.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon.jpeg
    - assets/google_logo.png
